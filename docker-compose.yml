# docker compose up -d                  → bring up postgres + app (build if needed)
# docker compose up -d --build           → force a rebuild of the app image
# docker compose up -d postgres          → just postgres (for `pnpm dev` on host)
# docker compose down                    → stop everything (data persisted)
# docker compose down -v                 → stop + wipe DB volume

services:
  postgres:
    image: postgres:16-alpine
    container_name: seat-reservation-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: seat_reservation
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d seat_reservation"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: seat-reservation:local
    container_name: seat-reservation-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Runs the production build, but keeps the in-repo mock payment provider
      # mounted via MOCK_PAYMENT_ENABLED=true so the reviewer can complete the
      # flow. In a real deploy you would set MOCK_PAYMENT_ENABLED=false and
      # configure a real provider (see docs/adr/0006).
      NODE_ENV: production
      MOCK_PAYMENT_ENABLED: "true"
      DATABASE_URL: postgres://app:app@postgres:5432/seat_reservation
      SESSION_COOKIE_NAME: seat_session
      SESSION_TTL_DAYS: "90"
      HOLD_TTL_MINUTES: "10"
      PAYING_TIMEOUT_MINUTES: "30"
      # Replace with a long random secret for any non-throwaway environment.
      MOCK_PAYMENT_WEBHOOK_SECRET: dev-only-mock-webhook-secret-do-not-use-in-prod
      # Browser hits this; container loopback also works on the same port.
      MOCK_PAYMENT_BASE_URL: http://localhost:3000
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
